<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Configuración básica del documento -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Título de la pestaña -->
  <title>Inicio de sesión</title>

  <!-- Conecta el archivo de estilos -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Tarjeta principal del formulario -->
  <div class="card">
    <h1>Inicio de sesión</h1>
    <p class="subtexto">Sistema con Express.js, JWT y cookies</p>

    <!-- Formulario para ingresar usuario y contraseña -->
    <form id="loginForm">
      <label for="username">Usuario</label>
      <input type="text" id="username" placeholder="Ingresa tu usuario" required>

      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="Ingresa tu contraseña" required>

      <button type="submit">Iniciar sesión</button>
    </form>

    <!-- Botón para acceder a la ruta privada -->
    <button id="btnPerfil" type="button">Ver perfil</button>
    <!-- Botón para cerrar sesión -->
    <button id="btnLogout" type="button">Cerrar sesión</button>
    <!-- Zona donde aparecerán los mensajes del sistema -->
    <div id="resultado">Aquí aparecerán los mensajes del sistema.</div>
  </div>

  <!-- Conecta el archivo JavaScript -->
  <script src="script.js"></script>
</body>
</html>
